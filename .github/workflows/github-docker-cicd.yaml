name: MLOps pipeline Score Credit - Leonardo

env:
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  REPO_NAME: ${{ secrets.REPO_NAME }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci_pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.6'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Format with Black
        run: |
          black app.py

      - name: Lint with Pylint
        run: |
          # On ignore les erreurs de refactoring (R) et de convention (C) comme demandé
          pylint --disable=R,C app.py 

      - name: Test with Pytest
        run: |
          python -m pytest -vv test.py

  cd_pipeline:
    runs-on: ubuntu-latest
    needs: [ci_pipeline]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d--%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build . --file Dockerfile \
            --tag ${{ secrets.DOCKER_USER }}/${{ secrets.REPO_NAME }}:latest \
            --tag ${{ secrets.DOCKER_USER }}/${{ secrets.REPO_NAME }}:${{ steps.date.outputs.date }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USER }}/${{ secrets.REPO_NAME }}:latest
          docker push ${{ secrets.DOCKER_USER }}/${{ secrets.REPO_NAME }}:${{ steps.date.outputs.date }}